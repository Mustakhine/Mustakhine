<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mustakhine | Cyber Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* MATRIX BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
}

.logo{
color:#00f7ff;
font-size:22px;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
}

.menu{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.profile{
width:160px;
border-radius:50%;
animation:float 4s ease-in-out infinite;
border:3px solid #00f7ff;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

h1{
margin-top:20px;
font-size:55px;
color:#00f7ff;
}

.btn{
margin-top:20px;
padding:12px 30px;
background:#00f7ff;
color:black;
border-radius:30px;
text-decoration:none;
}

/* SECTION */

section{
padding:100px 20px;
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:40px;
color:#00f7ff;
}

/* PROJECT CARDS */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#111;
padding:25px;
border-radius:15px;
transform-style:preserve-3d;
transition:0.4s;
}

.card:hover{
transform:rotateY(10deg) rotateX(10deg);
box-shadow:0 0 20px #00f7ff;
}

/* SOCIALS */

.socials{
display:flex;
justify-content:center;
gap:25px;
margin-top:30px;
}

.socials a{
font-size:28px;
color:#00f7ff;
}

/* CHATBOT */

.chatbot{
position:fixed;
bottom:20px;
right:20px;
width:300px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.chat-header{
background:#00f7ff;
color:black;
padding:10px;
}

.chat-messages{
height:200px;
overflow:auto;
padding:10px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:8px;
border:none;
}

.chat-input button{
background:#00f7ff;
border:none;
padding:8px 12px;
}

/* MOBILE */

@media(max-width:768px){

.nav-links{
display:none;
flex-direction:column;
position:absolute;
top:60px;
right:0;
background:#000;
width:200px;
padding:20px;
}

.menu{
display:block;
}

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<nav>

<div class="logo">Mustakhine</div>

<div class="menu" onclick="toggleMenu()">
<i class="fa fa-bars"></i>
</div>

<div class="nav-links" id="navLinks">

<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>

</div>

</nav>

<header>

<img src="https://i.imgur.com/2DhmtJ4.png" class="profile">

<h1>Mustakhine</h1>

<p>Web Developer • UI Innovator</p>

<a href="resume.pdf" download class="btn">Download Resume</a>

</header>

<section id="about">

<h2>About Me</h2>

<p style="text-align:center">
Computer Science student building futuristic web experiences.
</p>

</section>

<section id="projects">

<h2>Projects</h2>

<div class="projects" id="github-projects">

</div>

</section>

<section id="contact">

<h2>Contact</h2>

<div class="socials">

<a href="mailto:mustakhinemustafaattar@gmail.com">
<i class="fa-solid fa-envelope"></i>
</a>

<a href="https://www.instagram.com/mustakhine_attar">
<i class="fa-brands fa-instagram"></i>
</a>

<a href="#">
<i class="fa-brands fa-github"></i>
</a>

</div>

</section>

<!-- CHATBOT -->

<div class="chatbot">

<div class="chat-header">AI Assistant</div>

<div class="chat-messages" id="chat"></div>

<div class="chat-input">

<input id="msg">

<button onclick="send()">Send</button>

</div>

</div>

<script>

/* HAMBURGER MENU */

function toggleMenu(){
let nav=document.getElementById("navLinks");
nav.style.display=nav.style.display=="flex"?"none":"flex";
}

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

/* GITHUB PROJECT LOADER */

fetch("https://api.github.com/users/YOUR_GITHUB_USERNAME/repos")

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("github-projects");

data.slice(0,6).forEach(repo=>{

let div=document.createElement("div");

div.className="card";

div.innerHTML=`
<h3>${repo.name}</h3>
<p>${repo.description || "GitHub Project"}</p>
<a href="${repo.html_url}" target="_blank">View</a>
`;

container.appendChild(div);

});

});

/* SIMPLE CHATBOT */

function send(){

let input=document.getElementById("msg");
let chat=document.getElementById("chat");

let user=input.value;

chat.innerHTML+=`<div>You: ${user}</div>`;

let reply="I'm your portfolio assistant.";

if(user.includes("projects")) reply="Check my GitHub projects above.";
if(user.includes("contact")) reply="You can contact me via Instagram or email.";

chat.innerHTML+=`<div>Bot: ${reply}</div>`;

input.value="";

}

</script>

</body>
</html>
