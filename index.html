<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyberpunk Portfolio</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow-x:hidden;
}

/* MATRIX BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:#000;
position:fixed;
width:100%;
z-index:100;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:#00f7ff;
text-decoration:none;
}

.menu{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.profile-wrapper{
position:relative;
}

.profile{
width:170px;
border-radius:50%;
border:4px solid #00f7ff;
box-shadow:0 0 30px #00f7ff;
animation:float 4s infinite;
}

.online{
position:absolute;
bottom:10px;
right:10px;
width:18px;
height:18px;
background:#00ff5e;
border-radius:50%;
border:3px solid black;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

/* PROJECTS */

.projects{
padding:80px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
transition:.4s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00f7ff;
}

/* SKILLS */

.skill{
margin:20px auto;
width:80%;
}

.bar{
height:10px;
background:#333;
border-radius:20px;
}

.bar span{
display:block;
height:100%;
background:#00f7ff;
}

/* CONTACT */

.contact{
padding:80px 20px;
text-align:center;
}

.contact a{
display:block;
margin:10px;
color:#00f7ff;
}

/* BUTTON */

.btn{
padding:10px 20px;
background:#00f7ff;
border:none;
color:black;
cursor:pointer;
margin-top:10px;
}

/* CHATBOT */

.chatbot{
position:fixed;
right:20px;
bottom:20px;
width:300px;
background:rgba(0,0,0,0.8);
border:1px solid #00f7ff;
border-radius:12px;
backdrop-filter:blur(10px);
overflow:hidden;
}

.chat-header{
background:#00f7ff;
color:black;
padding:10px;
font-weight:bold;
display:flex;
justify-content:space-between;
}

.chat-body{
height:220px;
overflow-y:auto;
padding:10px;
font-size:14px;
}

.msg{
padding:8px 10px;
border-radius:8px;
margin:6px 0;
max-width:80%;
}

.user{
background:#00f7ff;
color:black;
margin-left:auto;
}

.bot{
background:#222;
}

.chat-input{
display:flex;
border-top:1px solid #00f7ff;
}

.chat-input input{
flex:1;
padding:8px;
background:black;
border:none;
color:white;
}

.chat-input button{
background:#00f7ff;
border:none;
padding:8px 12px;
cursor:pointer;
}

/* BACK BUTTON */

#topBtn{
position:fixed;
bottom:20px;
left:20px;
padding:10px;
border:none;
background:#00f7ff;
border-radius:50%;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

nav ul{
display:none;
flex-direction:column;
background:black;
position:absolute;
top:60px;
right:20px;
}

nav ul.show{
display:flex;
}

.menu{
display:block;
}

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- NAVBAR -->

<nav>

<h2>My Portfolio</h2>

<div class="menu" onclick="toggleMenu()">
<i class="fa fa-bars"></i>
</div>

<ul id="navLinks">
<li><a href="#">Home</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#skills">Skills</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

</nav>

<!-- HERO -->

<section class="hero">

<div class="profile-wrapper">

<img src="https://i.imgur.com/8Km9tLL.png" class="profile">

<div class="online"></div>

</div>

<h1>Hello I'm Mustakhine</h1>

<p id="typing"></p>

<a href="resume.pdf" download>
<button class="btn">Download Resume</button>
</a>

</section>

<!-- PROJECTS -->

<section id="projects" class="projects">

<h2>Projects</h2>

<div class="grid" id="repoGrid"></div>

</section>

<!-- SKILLS -->

<section id="skills">

<h2 style="text-align:center;">Skills</h2>

<div class="skill">
<p>HTML</p>
<div class="bar"><span style="width:95%"></span></div>
</div>

<div class="skill">
<p>CSS</p>
<div class="bar"><span style="width:90%"></span></div>
</div>

<div class="skill">
<p>JavaScript</p>
<div class="bar"><span style="width:85%"></span></div>
</div>

</section>

<!-- CONTACT -->

<section id="contact" class="contact">

<h2>Contact</h2>

<a href="mailto:youremail@example.com">
<i class="fa fa-envelope"></i> Email
</a>

<a href="https://github.com/yourusername" target="_blank">
<i class="fab fa-github"></i> GitHub
</a>

<a href="#">
<i class="fab fa-instagram"></i> Instagram
</a>

</section>

<footer style="text-align:center;padding:30px;">
<p id="visits"></p>
</footer>

<button onclick="topFunction()" id="topBtn">↑</button>

<!-- CHATBOT -->

<div class="chatbot">

<div class="chat-header">
AI Assistant
</div>

<div class="chat-body" id="chat"></div>

<div class="chat-input">
<input id="msg" placeholder="Ask something...">
<button onclick="send()">➤</button>
</div>

</div>

<script>

/* MOBILE MENU */

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("show");
}

/* TYPING */

const words=["Web Developer","UI Designer","Cyberpunk Creator"];
let i=0;
let j=0;
let typing=document.getElementById("typing");

function type(){

let word=words[i];

typing.textContent=word.substring(0,j++);

if(j>word.length){
j=0;
i=(i+1)%words.length;
}

setTimeout(type,150);

}

type();

/* GITHUB PROJECTS */

fetch("https://api.github.com/users/github/repos")
.then(res=>res.json())
.then(data=>{

let grid=document.getElementById("repoGrid");

data.slice(0,6).forEach(repo=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${repo.name}</h3>
<p>${repo.description||"No description"}</p>
<a href="${repo.html_url}" target="_blank">View</a>
`;

grid.appendChild(card);

});

});

/* CHATBOT */

function send(){

let input=document.getElementById("msg");
let chat=document.getElementById("chat");

let user=input.value.toLowerCase();

let userMsg=document.createElement("div");
userMsg.className="msg user";
userMsg.textContent=input.value;
chat.appendChild(userMsg);

let reply="I'm Mustakhine's assistant.";

if(user.includes("project")) reply="You can see projects above.";
if(user.includes("contact")) reply="Check the contact section.";
if(user.includes("skills")) reply="HTML CSS JavaScript.";

let botMsg=document.createElement("div");
botMsg.className="msg bot";
botMsg.textContent=reply;

setTimeout(()=>chat.appendChild(botMsg),500);

chat.scrollTop=chat.scrollHeight;

input.value="";

}

/* ENTER KEY */

document.getElementById("msg")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
send();
}

});

/* VISITS */

let visits=localStorage.getItem("visits");
visits=visits?parseInt(visits)+1:1;
localStorage.setItem("visits",visits);

document.getElementById("visits").innerText="Visitors: "+visits;

/* BACK TO TOP */

function topFunction(){
window.scrollTo({top:0,behavior:"smooth"});
}

/* MATRIX */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01".split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
