<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cyberpunk Portfolio</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:#000;
position:fixed;
width:100%;
z-index:100;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:#00f7ff;
text-decoration:none;
}

.menu{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.profile{
width:160px;
border-radius:50%;
border:3px solid #00f7ff;
animation:float 4s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* PROJECTS */

.projects{
padding:80px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
transition:0.4s;
transform-style:preserve-3d;
}

.card:hover{
transform:rotateY(10deg) scale(1.05);
box-shadow:0 0 20px #00f7ff;
}

/* SKILLS */

.skill{
margin:20px auto;
width:80%;
}

.bar{
height:10px;
background:#333;
border-radius:20px;
}

.bar span{
display:block;
height:100%;
background:#00f7ff;
}

/* BUTTON */

.btn{
padding:10px 20px;
background:#00f7ff;
border:none;
color:black;
cursor:pointer;
margin-top:10px;
}

/* SEARCH */

#search{
padding:10px;
width:250px;
margin-bottom:30px;
}

/* CHATBOT */

.chatbot{
position:fixed;
right:20px;
bottom:20px;
background:#111;
padding:10px;
border-radius:10px;
width:250px;
}

#chat{
height:150px;
overflow:auto;
font-size:14px;
}

.chatbot input{
width:70%;
}

/* BACK TO TOP */

#topBtn{
position:fixed;
bottom:20px;
left:20px;
padding:10px;
border:none;
background:#00f7ff;
border-radius:50%;
cursor:pointer;
}

/* DARK LIGHT */

.light{
background:white;
color:black;
}

.theme-btn{
background:none;
border:none;
color:#00f7ff;
font-size:20px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

nav ul{
display:none;
flex-direction:column;
background:black;
position:absolute;
top:60px;
right:20px;
}

nav ul.show{
display:flex;
}

.menu{
display:block;
}

}

.reveal{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<nav>

<h2>My Portfolio</h2>

<div class="menu" onclick="toggleMenu()">
<i class="fa fa-bars"></i>
</div>

<ul id="navLinks">
<li><a href="#">Home</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#skills">Skills</a></li>
</ul>

<button onclick="toggleTheme()" class="theme-btn">
<i class="fa fa-moon"></i>
</button>

</nav>

<section class="hero">

<img src="https://i.imgur.com/8Km9tLL.png" class="profile">

<h1>Hello I'm Mustakhine</h1>

<p id="typing"></p>

<a href="resume.pdf" download>
<button class="btn">Download Resume</button>
</a>

</section>

<section id="projects" class="projects reveal">

<h2>Projects</h2>

<input id="search" placeholder="Search projects..." onkeyup="searchProject()">

<div class="grid" id="repoGrid"></div>

</section>

<section id="skills" class="reveal">

<h2 style="text-align:center;">Skills</h2>

<div class="skill">
<p>HTML</p>
<div class="bar"><span style="width:95%"></span></div>
</div>

<div class="skill">
<p>CSS</p>
<div class="bar"><span style="width:90%"></span></div>
</div>

<div class="skill">
<p>JavaScript</p>
<div class="bar"><span style="width:85%"></span></div>
</div>

</section>

<footer style="text-align:center;padding:30px;">
<p id="visits"></p>
</footer>

<button onclick="topFunction()" id="topBtn">↑</button>

<div class="chatbot">

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

</div>

<script>

/* MOBILE MENU */

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("show");
}

/* THEME */

function toggleTheme(){
document.body.classList.toggle("light");
}

/* TYPING */

const words=["Web Developer","UI Designer","Cyberpunk Creator"];
let i=0;
let j=0;
let typing=document.getElementById("typing");

function type(){

let word=words[i];

typing.textContent=word.substring(0,j++);

if(j>word.length){
j=0;
i=(i+1)%words.length;
}

setTimeout(type,150);

}

type();

/* GITHUB PROJECT LOADER */

fetch("https://api.github.com/users/github/repos")
.then(res=>res.json())
.then(data=>{

let grid=document.getElementById("repoGrid");

data.slice(0,6).forEach(repo=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${repo.name}</h3>
<p>${repo.description||"No description"}</p>
<a href="${repo.html_url}" target="_blank">View</a>
`;

grid.appendChild(card);

});

});

/* SEARCH */

function searchProject(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();
card.style.display=text.includes(input)?"block":"none";

});

}

/* SCROLL REVEAL */

window.addEventListener("scroll",()=>{

document.querySelectorAll(".reveal").forEach(r=>{

let top=r.getBoundingClientRect().top;

if(top<window.innerHeight-100){
r.classList.add("active");
}

});

});

/* CHATBOT */

function send(){

let input=document.getElementById("msg");
let chat=document.getElementById("chat");

let user=input.value.toLowerCase();

chat.innerHTML+=`<div>You: ${user}</div>`;

let reply="I'm Mustakhine's assistant.";

if(user.includes("project")) reply="Check the projects section above.";

if(user.includes("contact")) reply="Contact via GitHub or email.";

if(user.includes("skills")) reply="Skills include HTML CSS JS.";

chat.innerHTML+=`<div>Bot: ${reply}</div>`;

input.value="";

}

/* BACK TO TOP */

function topFunction(){
window.scrollTo({top:0,behavior:"smooth"});
}

/* VISITOR COUNTER */

let visits=localStorage.getItem("visits");

visits=visits?parseInt(visits)+1:1;

localStorage.setItem("visits",visits);

document.getElementById("visits").innerText="Visitors: "+visits;

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
