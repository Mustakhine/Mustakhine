<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mustakhine | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Orbitron', sans-serif;
    }

    body{
        background-color: #0f0f1a;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }

    h1{
        font-size: 60px;
        background: linear-gradient(90deg, #00f7ff, #ff00ff, #00ff99);
        background-size: 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gradientMove 5s linear infinite;
        margin-bottom: 20px;
    }

    @keyframes gradientMove{
        0% {background-position:0%;}
        100% {background-position:300%;}
    }

    .about{
        font-size: 22px;
        max-width: 600px;
        line-height: 1.5;
        color: #00f7ff;
    }

</style>
</head>

<body>

    <h1>Mustakhine</h1>
    <p class="about">
        I am a passionate Computer Science student with a love for futuristic web development,, and innovative projects. I enjoy building responsive, modern websites and exploring next-generation web technologies.
    </p>

</body>
</html>
